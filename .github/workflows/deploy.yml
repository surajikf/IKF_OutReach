name: Auto Deploy to On-Premises Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Adjust ownership and permissions
        run: |
          echo "Setting ownership to ${{ vars.APP_USER }}:${{ vars.APP_GROUP }}..."
          sudo chown -R ${{ vars.APP_USER }}:${{ vars.APP_GROUP }} ${{ vars.REPO_PATH }}
          sudo chmod -R u+rwX ${{ vars.REPO_PATH }}/backend/.next || true
          sudo chmod -R u+rwX ${{ vars.REPO_PATH }}/frontend/.next || true

      - name: Deploy Application
        run: |
          echo "Starting deployment..."
          cd ${{ vars.REPO_PATH }}

          git fetch origin main
          git reset --hard origin/main

          echo "Building Backend..."
          cd backend
          npm ci
          npm run build

          echo "Building Frontend..."
          cd ../frontend
          npm ci
          npm run build

          echo "Restarting PM2 processes..."
          cd ..
          pm2 restart ecosystem.config.js

          echo "Deployment completed successfully!"
