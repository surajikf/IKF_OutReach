name: Deploy Outreach App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Sync Project Files
        run: |
          sudo rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='.next' \
            ./ /var/www/apps/outreach/

      - name: Set Permissions
        run: |
          sudo chown -R ikf-support:www-data /var/www/apps/outreach
          sudo chmod -R 775 /var/www/apps/outreach

      - name: Install Dependencies
        run: |
          cd /var/www/apps/outreach
          npm install

      - name: Generate Prisma Client
        run: |
          cd /var/www/apps/outreach
          npx prisma generate

      - name: Build Application
        run: |
          cd /var/www/apps/outreach

          export $(grep -v '^#' .env | xargs)

          npm run build

      - name: Copy Static Files
        run: |
          cd /var/www/apps/outreach

          mkdir -p .next/standalone/.next

          cp -r .next/static .next/standalone/.next/

          cp -r public .next/standalone/

      - name: Restart PM2
        run: |
          cd /var/www/apps/outreach

          pm2 restart outreach --update-env

      - name: Save PM2
        run: |
          pm2 save