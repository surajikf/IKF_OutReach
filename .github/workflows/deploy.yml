name: Deploy Outreach

on:
  push:
    branches:
      - Main

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]

    defaults:
      run:
        working-directory: /var/www/apps/outreach

    steps:
      - name: Fix Git safe directory
        run: git config --global --add safe.directory /var/www/apps/outreach

      - name: Pull latest code (force clean)
        run: |
          git fetch origin
          git reset --hard origin/Main

      - name: Install dependencies
        run: npm ci

      - name: Prisma setup
        run: |
          npx prisma generate
          npx prisma migrate deploy || true

      - name: Build app
        run: npm run build

      - name: Reload PM2 (zero downtime)
        run: |
          sudo pm2 reload outreach || sudo pm2 start ecosystem.config.cjs

      - name: Save PM2 state
        run: sudo pm2 save
