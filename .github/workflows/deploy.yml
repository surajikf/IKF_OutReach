name: Auto Deploy to On-Premises Server

on:
  push:
    branches:
      - main

env:
  REPO_PATH: /var/www/apps/outreach
  APP_USER: ikf-support
  APP_GROUP: www-data
  NODE_OPTIONS: "--max-old-space-size=2048"

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Adjust ownership and permissions
        run: |
          echo "Setting ownership to $APP_USER:$APP_GROUP..."
          sudo chown -R $APP_USER:$APP_GROUP $REPO_PATH
          sudo chmod -R u+rwX $REPO_PATH/backend/.next || true
          sudo chmod -R u+rwX $REPO_PATH/frontend/.next || true

      - name: Pull latest code
        run: |
          cd $REPO_PATH
          git fetch origin main
          git reset --hard origin/main
          echo "Current Commit: $(git rev-parse HEAD)"

      - name: Build Application
        run: |
          cd $REPO_PATH
          npm install
          npx prisma generate
          npm run build

      - name: Restart PM2 processes
        run: |
          cd $REPO_PATH
          pm2 restart ecosystem.config.js || pm2 start ecosystem.config.js
          echo "Deployment completed successfully!"
